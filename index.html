<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>When Will You Come Here?</title>
    <style>
        :root{
            --bg-1: #ff9a9e;
            --bg-2: #fad0c4;
            --card-bg: rgba(255,255,255,0.98);
            --accent: #e74c3c;
            --success-1: #27ae60;
            --success-2: #2ecc71;
            --muted: #7f8c8d;
        }
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        *{box-sizing:border-box}
        html,body{height:100%}
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg,var(--bg-1) 0%, var(--bg-2) 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            color: #222;
            overflow: hidden;
        }

        .stage{
            width: 100%;
            max-width: 760px;
            padding: 36px;
        }

        .card {
            position: relative;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.12);
            text-align: center;
            overflow: visible;
            backdrop-filter: blur(6px) saturate(120%);
            animation: pop .6s cubic-bezier(.2,.9,.3,1);
        }
        @keyframes pop{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}

        h1{
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 3.6vw, 3rem);
            margin: 0 0 8px 0;
            color: var(--accent);
            letter-spacing: -0.02em;
        }
        p.lead{
            margin: 0 0 22px 0;
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: #2c3e50;
        }

        .controls{
            position: relative;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn {
            -webkit-tap-highlight-color: transparent;
            appearance: none;
            border: none;
            padding: 14px 28px;
            font-size: 1.05rem;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 10px 24px rgba(0,0,0,0.12);
            transition: transform 220ms cubic-bezier(.2,.9,.3,1), box-shadow 220ms;
        }

        .btn:active{transform:scale(.98)}

        .yes{
            background: linear-gradient(45deg,var(--success-1),var(--success-2));
            color: #fff;
            margin-right: 20px;
        }

        /* The no button will be absolutely positioned inside .controls so it can move */
        .no{
            position: absolute;
            background: linear-gradient(45deg,#ff6b6b,#ff4757);
            color: #fff;
            right: calc(50% - 86px);
            top: 30px;
        }

        .hint{font-size:0.9rem;color:var(--muted);margin-top:18px}

        .hearts{
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .heart{
            position: absolute;
            font-size: 20px;
            animation: rise linear infinite;
            opacity: .85;
            transform-origin:center;
        }
        @keyframes rise{from{transform:translateY(110vh) rotate(0)}to{transform:translateY(-20vh) rotate(360deg)}}

        footer{margin-top:18px;color:var(--muted);font-size:0.9rem}

        /* small screens */
        @media (max-width:420px){
            .controls{height:160px}
            .no{top:20px}
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    <main class="stage">
        <section class="card">
            <h1>💕 When Will You Come Here?</h1>
            <p class="lead">I can't wait to see you. Will you come visit me?</p>

            <div class="controls" id="controls">
                <button class="btn yes" id="yesBtn">Yes, Soon! ❤️</button>
                <button class="btn no" id="noBtn">Not Yet 😢</button>
            </div>

            <div class="hint">Tap the buttons — try catching the No button if you can 😄</div>
            <footer>Made with ❤️</footer>
        </section>
    </main>

    <script>
        // Floating hearts
        const heartsRoot = document.getElementById('hearts');
        function createHeart(){
            const d = document.createElement('div');
            d.className = 'heart';
            d.textContent = ['❤️','💖','💕','💗'][Math.floor(Math.random()*4)];
            const size = Math.random()*18 + 14;
            d.style.fontSize = size + 'px';
            d.style.left = Math.random()*100 + 'vw';
            d.style.animationDuration = (Math.random()*6 + 6) + 's';
            d.style.opacity = (Math.random()*0.4 + 0.6).toFixed(2);
            heartsRoot.appendChild(d);
            setTimeout(()=>d.remove(), 14000);
        }
        setInterval(createHeart, 360);

        // No button evasive behavior
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const controls = document.getElementById('controls');

        // Keep track of last position to avoid tiny moves
        function randomPosWithin(el, btn){
            const rect = el.getBoundingClientRect();
            const btnRect = btn.getBoundingClientRect();
            const padding = 8; // keep a little margin
            const minX = rect.left + padding;
            const maxX = rect.right - btnRect.width - padding;
            const minY = rect.top + padding;
            const maxY = rect.bottom - btnRect.height - padding;

            // if container is too small, place near center
            if(maxX <= minX || maxY <= minY){
                return {x: rect.left + (rect.width - btnRect.width)/2, y: rect.top + (rect.height - btnRect.height)/2};
            }

            // choose random within bounds
            const x = Math.random() * (maxX - minX) + minX;
            const y = Math.random() * (maxY - minY) + minY;
            return {x, y};
        }

        // Move the button smoothly to new position inside the viewport
        function moveNoButton(){
            const pos = randomPosWithin(document.body, noBtn);
            // convert to coordinates relative to controls container
            const parentRect = controls.getBoundingClientRect();
            const left = pos.x - parentRect.left;
            const top = pos.y - parentRect.top;
            noBtn.style.transition = 'left 260ms cubic-bezier(.2,.9,.3,1), top 260ms cubic-bezier(.2,.9,.3,1)';
            noBtn.style.left = Math.max(6, Math.min(left, parentRect.width - noBtn.offsetWidth - 6)) + 'px';
            noBtn.style.top = Math.max(6, Math.min(top, parentRect.height - noBtn.offsetHeight - 6)) + 'px';
        }

        // Initialize no button position centered to the right of Yes (for wide screens)
        function initNoPos(){
            noBtn.style.position = 'absolute';
            const parentRect = controls.getBoundingClientRect();
            // Place it to the right side of center
            noBtn.style.left = (parentRect.width/2 + 40) + 'px';
            noBtn.style.top = (parentRect.height/2 - noBtn.offsetHeight/2) + 'px';
        }

        // On pointerdown/tap, move the button (avoid letting the click register as a "press")
        noBtn.addEventListener('pointerdown', (e)=>{
            e.preventDefault();
            moveNoButton();
            // small wiggle effect
            noBtn.animate([{transform:'scale(1)'},{transform:'scale(1.06)'},{transform:'scale(1)'}],{duration:260});
        });

        // Also move when hovered with mouse to be cheeky
        noBtn.addEventListener('mouseenter', ()=>{
            if(window.matchMedia('(hover: hover)').matches){
                moveNoButton();
            }
        });

        // Protect against keyboard focus triggering; keep accessibility by allowing Enter/Space to click it (it will move)
        noBtn.addEventListener('keydown', (e)=>{
            if(e.key === 'Enter' || e.key === ' '){
                e.preventDefault();
                moveNoButton();
            }
        });

        // Yes button navigates to the date/time page
        yesBtn.addEventListener('click', ()=>{
            window.location.href = 'date.html';
        });

        // Initialize positions after fonts and layout are ready
        window.addEventListener('load', ()=>{
            initNoPos();
            // make a few hearts on load
            for(let i=0;i<8;i++) setTimeout(createHeart, i*120);
        });

        // small confetti effect kept for future pages
        function confettiBurst(){
            for(let i=0;i<36;i++){
                setTimeout(()=>{
                    const el = document.createElement('div');
                    el.textContent = ['🎉','✨','💖','🎈'][Math.floor(Math.random()*4)];
                    el.style.position='fixed';
                    el.style.left = Math.random()*100 + 'vw';
                    el.style.top = '-20px';
                    el.style.fontSize = (12+Math.random()*18)+'px';
                    el.style.zIndex = 9999;
                    document.body.appendChild(el);
                    let y= -20;
                    const id = setInterval(()=>{
                        y += 10 + Math.random()*12;
                        el.style.top = y + 'px';
                        el.style.transform = `rotate(${y*2}deg)`;
                        if(y > window.innerHeight + 40){
                            clearInterval(id); el.remove();
                        }
                    }, 24);
                }, i*14);
            }
        }
    </script>
</body>
</html>
