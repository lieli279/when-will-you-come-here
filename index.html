<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>When Will You Come Here?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            font-family: 'Roboto', sans-serif;
            color: #333;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: #e74c3c;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        p.question {
            font-size: 1.8rem;
            margin-bottom: 40px;
            color: #2c3e50;
            line-height: 1.4;
        }

        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        button {
            padding: 15px 40px;
            font-size: 1.3rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        button.yes {
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
        }

        button.no {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            color: white;
        }

        button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        button:active {
            transform: scale(0.95);
        }

        .hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            color: #ff6b6b;
            animation: float 8s linear infinite;
            opacity: 0.7;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }

        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    
    <div class="container">
        <h1>💕 When Will You Come Here? 💕</h1>
        <p class="question">I can't wait to see you...</p>
        
        <div class="buttons">
            <button class="yes" onclick="handleYes()">Yes, Soon! ❤️</button>
            <button class="no" onclick="handleNo()">Not Yet 😢</button>
        </div>
        
        <div class="footer">
            Made with love for you
        </div>
    </div>

    <script>
        // Floating hearts animation
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.textContent = ['❤️', '💖', '💕', '💗'][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 5 + 6) + 's';
            heart.style.opacity = Math.random() * 0.5 + 0.5;
            document.getElementById('hearts').appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 12000);
        }

        setInterval(createHeart, 300);

        function handleYes() {
            const container = document.querySelector('.container');
            container.innerHTML = `
                <h1>Yay! 🎉</h1>
                <p style="font-size: 2rem; color: #27ae60;">I'll be there soon! Can't wait to hold you ❤️</p>
                <button onclick="location.reload()" style="margin-top: 30px; padding: 12px 30px; font-size: 1.1rem;">Back</button>
            `;
            confettiEffect();
        }

        function handleNo() {
            const container = document.querySelector('.container');
            container.innerHTML = `
                <h1>😔</h1>
                <p style="font-size: 1.8rem;">Okay... I'll keep waiting for you</p>
                <button onclick="location.reload()" style="margin-top: 30px; padding: 12px 30px; font-size: 1.1rem;">Try Again</button>
            `;
        }

        function confettiEffect() {
            // Simple confetti using CSS/JS
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const conf = document.createElement('div');
                    conf.style.position = 'fixed';
                    conf.style.left = Math.random() * 100 + 'vw';
                    conf.style.top = '-10px';
                    conf.style.fontSize = '20px';
                    conf.textContent = ['🎉', '✨', '💖'][Math.floor(Math.random()*3)];
                    conf.style.zIndex = 1000;
                    document.body.appendChild(conf);
                    
                    let y = 0;
                    const animate = setInterval(() => {
                        y += 8;
                        conf.style.top = y + 'px';
                        conf.style.transform = `rotate(${y * 2}deg)`;
                        if (y > window.innerHeight) {
                            clearInterval(animate);
                            conf.remove();
                        }
                    }, 20);
                }, i * 20);
            }
        }
    </script>
</body>
</html>
